<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NTT Share Hub - Preview</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ec4445;
            --primary-hover: #d33a3b;
            --bg: #152036;
            --card-bg: #1b2a47;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            padding: 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .header-logo {
            text-align: center;
            margin-bottom: 20px;
        }

        .header-logo img {
            max-width: 180px;
            height: auto;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            color: var(--text);
            text-align: center;
            font-weight: 700;
        }

        p.subtitle {
            color: var(--text-dim);
            text-align: center;
            margin-bottom: 2rem;
        }

        .upload-zone {
            border: 2px dashed var(--glass-border);
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 2rem;
        }

        .upload-zone:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.02);
        }

        .btn {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 12px 24px;
            border-radius: 4px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
            border: none;
            cursor: pointer;
            width: 100%;
            text-align: center;
        }

        .btn:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .file-list {
            margin-top: 2rem;
            list-style: none;
        }

        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 4px;
            margin-bottom: 8px;
            border: 1px solid transparent;
            transition: 0.2s;
        }

        .file-item:hover {
            border-color: var(--glass-border);
        }

        .file-name {
            font-size: 0.9rem;
            color: var(--text);
        }

        .file-actions a {
            color: var(--primary);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>NTT Share Hub</h1>
        <p class="subtitle" style="color: #ec4445; font-weight: 600;">NEW DESIGN MATCH</p>

        <div class="upload-zone">
            <svg style="width: 48px; height: 48px; color: var(--primary); margin-bottom: 12px;" fill="none"
                stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
            </svg>
            <p style="margin-bottom: 4px;">Click to upload or drag & drop</p>
        </div>

        <div class="file-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="font-size: 1rem;">Recent Files</h3>
                <span style="color: var(--primary); font-size: 0.85rem; cursor: pointer;">Zip Export All</span>
            </div>

            <ul class="file-list">
                <li class="file-item">
                    <span class="file-name">backup_jan_2024.zip</span>
                    <div class="file-actions">
                        <a href="#">Download</a>
                    </div>
                </li>
            </ul>
        </div>

        <a href="#" class="btn btn-secondary">Back to Dashboard</a>
    </div>

</body>

</html>
